name: Seguridad-DIMAZ
on: [push]
jobs:
  analisis-y-construccion:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar Código
        uses: actions/checkout@v3

      - name: Construir Imagen Docker
        run: docker build -t monitor-pyme:latest .

      - name: Escaneo de Seguridad (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'monitor-pyme:latest'
          format: 'table'
          exit-code: '0' # Esto evita que el pipeline falle y te permite ver los resultados
          severity: 'CRITICAL,HIGH'
