name: Seguridad-DIMAZ
on: [push]
jobs:
  analisis-y-construccion:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar Código
        uses: actions/checkout@v3
      - name: Construir Imagen Docker
        run: docker build -t monitor-pyme:v1 .
      - name: Escaneo de Seguridad (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'monitor-pyme:v1'
          format: 'table'
          exit-code: '1' # Esto hace que el pipeline falle si hay virus/vulnerabilidades
          severity: 'CRITICAL,HIGH'
